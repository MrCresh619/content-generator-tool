services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: content-generator-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./apps/api:/app
      - ./data:/data
    command: uv run fastapi dev app/main.py --host 0.0.0.0 --port 8000

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: content-generator-web
    ports:
      - "5173:5173"
    env_file:
      - .env
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0
